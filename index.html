<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bienvenido a Netsus</title>
  <style>
    :root {
      --bg-1: #0b1020;
      --bg-2: #111827;
      --accent-1: #22d3ee;
      --accent-2: #8b5cf6;
      --text: #f8fafc;
      --muted: #cbd5e1;
      --glass: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.18);
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(34, 211, 238, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(139, 92, 246, 0.2), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      overflow: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: auto;
      width: 320px;
      height: 320px;
      border-radius: 999px;
      filter: blur(80px);
      z-index: 0;
      opacity: 0.5;
    }

    body::before {
      top: -60px;
      left: -60px;
      background: rgba(34, 211, 238, 0.24);
    }

    body::after {
      right: -60px;
      bottom: -60px;
      background: rgba(139, 92, 246, 0.24);
    }

    .card {
      position: relative;
      z-index: 1;
      width: min(92vw, 720px);
      padding: 56px 40px;
      border: 1px solid var(--border);
      border-radius: 28px;
      background: var(--glass);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .badge {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 14px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 999px;
      font-size: 0.9rem;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.05);
      letter-spacing: 0.02em;
    }

    h1 {
      font-size: clamp(2.4rem, 6vw, 4.6rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
      margin-bottom: 14px;
      text-wrap: balance;
    }

    p {
      max-width: 560px;
      margin: 0 auto 32px;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--muted);
    }

    .privacy-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 15px 24px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.18), rgba(139, 92, 246, 0.22));
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 12px 30px rgba(34, 211, 238, 0.12);
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .privacy-link:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 16px 40px rgba(139, 92, 246, 0.18);
      background: linear-gradient(135deg, rgba(34, 211, 238, 0.28), rgba(139, 92, 246, 0.32));
    }

    .privacy-link:active {
      transform: translateY(0) scale(0.99);
    }

    .privacy-link span:last-child {
      font-size: 1.15rem;
      transition: transform 0.25s ease;
    }

    .privacy-link:hover span:last-child {
      transform: translateX(3px);
    }

    @media (max-width: 600px) {
      .card {
        padding: 40px 24px;
        border-radius: 22px;
      }

      p {
        font-size: 0.98rem;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="badge">Netsus</div>
    <h1>Bienvenido a Netsus</h1>
    <p>
      Explora una experiencia moderna, elegante y enfocada en la claridad.
    </p>
    <a class="privacy-link" href="https://netsus.me/privacy">
      <span>Politica de privacidad</span>
      <span>→</span>
    </a>
  </main>
</body>
</html>
