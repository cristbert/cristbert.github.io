<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Is there life outside earth?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 100%);
            color: white;
            overflow: hidden; /* Evita el scroll para la experiencia inmersiva */
            height: 100vh;
            margin: 0;
        }

        /* Contenedor de estrellas */
        #stars-container {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0;
            left: 0;
        }

        /* Efecto de resplandor en el texto */
        .glow-text {
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3), 0 0 40px rgba(56, 189, 248, 0.4);
        }

        /* Animación de entrada principal */
        .fade-in-up {
            animation: fadeInUp 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        .delay-100 { animation-delay: 0.3s; }
        .delay-200 { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Planeta decorativo */
        .planet {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: linear-gradient(145deg, #1e3a8a, #000000);
            box-shadow: inset -20px -20px 40px rgba(0,0,0,0.8), 0 0 60px rgba(30, 58, 138, 0.4);
            position: absolute;
            bottom: -150px;
            right: -100px;
            z-index: -1;
            opacity: 0.6;
        }
    </style>
</head>
<body class="flex items-center justify-center relative">

    <!-- Fondo espacial animado -->
    <div id="stars-container"></div>
    
    <!-- Elemento decorativo del planeta -->
    <div class="planet"></div>

    <!-- Contenido Principal -->
    <main class="text-center z-10 px-6 max-w-4xl">
        <span class="inline-block py-1 px-3 rounded-full bg-blue-900/30 border border-blue-500/30 text-blue-300 text-sm font-semibold tracking-wider uppercase mb-6 fade-in-up">
            Capstone proyect
        </span>
        
        <h1 class="text-5xl md:text-7xl lg:text-8xl font-black tracking-tighter mb-6 glow-text fade-in-up delay-100 leading-tight">
            Is there life <br/>
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300">outside earth?</span>
        </h1>
        
        <p class="text-lg md:text-xl text-slate-400 max-w-2xl mx-auto mb-10 fade-in-up delay-200 font-light">
            Let's see if there is life on other planets and learn how living conditions vary across them.
        </p>
        
        <div class="fade-in-up delay-200">
            <button class="group relative px-8 py-4 bg-transparent overflow-hidden rounded-full transition-all hover:scale-105 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:ring-offset-2 focus:ring-offset-slate-900">
                <div class="absolute inset-0 w-full h-full bg-gradient-to-r from-blue-600 to-cyan-500 opacity-80 group-hover:opacity-100 transition-opacity"></div>
                <div class="absolute bottom-0 left-0 h-1/3 w-full bg-white/20 blur-md"></div>
                <span class="relative font-bold text-white tracking-wide">
                    Descubrir la Verdad
                </span>
            </button>
        </div>
    </main>

    <script>
        // Generador de estrellas con JavaScript para un efecto inmersivo
        const starsContainer = document.getElementById('stars-container');
        const numStars = 200;

        // Añadimos estilos de animación dinámica para las estrellas
        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes twinkle {
                0%, 100% { opacity: 0.1; transform: scale(0.8); }
                50% { opacity: 1; transform: scale(1.2); }
            }
        `;
        document.head.appendChild(styleSheet);

        for (let i = 0; i < numStars; i++) {
            const star = document.createElement('div');
            
            // Tamaños aleatorios para las estrellas
            const size = Math.random() * 3;
            
            star.style.position = 'absolute';
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.backgroundColor = 'white';
            star.style.borderRadius = '50%';
            
            // Posiciones aleatorias en toda la pantalla
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            
            // Variación en la animación
            const duration = Math.random() * 4 + 2; // entre 2s y 6s
            const delay = Math.random() * 5; // retraso de hasta 5s
            
            star.style.animation = `twinkle ${duration}s infinite ease-in-out ${delay}s`;
            
            // Añadir un poco de color a algunas estrellas (azules o amarillentas)
            const colorRandom = Math.random();
            if(colorRandom > 0.9) {
                star.style.backgroundColor = '#93c5fd'; // azul claro
                star.style.boxShadow = '0 0 4px #93c5fd';
            } else if (colorRandom < 0.1) {
                star.style.backgroundColor = '#fde047'; // amarillo claro
                star.style.boxShadow = '0 0 4px #fde047';
            }

            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
