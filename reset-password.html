<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - NotasPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #007bff;
            --primary-color-darker: #0056b3;
            --secondary-color: #6a11cb;
            --secondary-color-lighter: #8a3ffc;
            --accent-color: #2575fc;
            --text-color: #e0e0e0;
            --text-color-muted: #adb5bd;
            --bg-color-main: #121212;
            --bg-color-surface: #1e1e1e;
            --input-bg: #2c2c2c;
            --input-border-focus: var(--primary-color);
            --success-color: #28a745;
            --error-color: #dc3545;
            --border-color: #3a3a3a;
            --font-family: 'Poppins', sans-serif;
            --font-family-headings: 'Montserrat', sans-serif;
            --box-shadow-soft: 0 4px 15px rgba(0, 0, 0, 0.2);
            --box-shadow-strong: 0 8px 25px rgba(0, 0, 0, 0.3);
            --border-radius: 12px;
            --transition-main: all 0.3s ease-in-out;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-family);
            background: linear-gradient(135deg, var(--bg-color-main) 0%, #1a1a1a 100%);
            color: var(--text-color);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .reset-container {
            background: linear-gradient(145deg, var(--bg-color-surface), #232323);
            padding: 2.5rem 3rem;
            border-radius: var(--border-radius);
            box-shadow: var(--box-shadow-strong);
            width: 90%;
            max-width: 500px;
            border: 1px solid var(--border-color);
            animation: fadeInScaleUp 0.5s ease-out forwards;
        }
        @keyframes fadeInScaleUp { from { opacity: 0; transform: translateY(20px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .reset-container h1 {
            font-family: var(--font-family-headings); font-size: 1.8rem;
            color: transparent; background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text; background-clip: text; text-align: center;
            margin-bottom: 1rem; border-bottom: 2px solid var(--primary-color); padding-bottom: 0.8rem;
        }
        .reset-container h1 i { margin-right: 0.75rem; font-size: 1.6rem; color: var(--primary-color); }
        .reset-container p.instructions {
            color: var(--text-color-muted); font-size: 0.9rem; text-align: center; margin-bottom: 1.5rem;
        }
        .form-group { margin-bottom: 1.5rem; position: relative; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; color: var(--text-color-muted); }
        .form-group input {
            width: 100%; padding: 0.9rem 1rem; padding-left: 2.5rem;
            border: 1px solid var(--border-color); border-radius: calc(var(--border-radius) - 4px);
            background-color: var(--input-bg); color: var(--text-color); font-size: 0.95rem;
            transition: var(--transition-main);
        }
        .form-group input:focus {
            outline: none; border-color: var(--input-border-focus);
            box-shadow: 0 0 0 3px rgba(0,123,255,.25);
            background-color: var(--bg-color-surface);
        }
        .form-group .input-icon { position: absolute; left: 0.9rem; top: 38px; transform: translateY(-50%); color: var(--text-color-muted); }
        .btn {
            padding: 0.85rem 1.8rem; border: none; border-radius: calc(var(--border-radius) - 4px);
            cursor: pointer; font-weight: 600; text-decoration: none;
            transition: var(--transition-main); font-size: 1rem; letter-spacing: 0.5px;
            width: 100%; display: flex; align-items: center; justify-content: center;
        }
        .btn i { margin-right: 0.5em; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-primary {
            background: linear-gradient(45deg, var(--secondary-color), var(--accent-color));
            color: white; box-shadow: 0 4px 15px rgba(106, 17, 203, 0.2); margin-top: 1rem;
        }
        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(45deg, var(--secondary-color-lighter), var(--primary-color));
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 6px 20px rgba(106, 17, 203, 0.3);
        }
        .back-link-container { text-align: center; margin-top: 2rem; }
        .back-link-container a {
            color: var(--text-color-muted); text-decoration: none; font-weight: 500;
            font-size: 0.9rem; transition: var(--transition-main);
            padding: 0.5em 0.8em; border-radius: calc(var(--border-radius) - 6px);
        }
        .back-link-container a:hover { color: var(--primary-color); background-color: var(--input-bg); }
        .back-link-container a i { margin-right: 0.4em; }
        #status-message {
            margin-top: 1.5rem; text-align: center; font-weight: 500;
            padding: 0.8rem; border-radius: calc(var(--border-radius) - 4px);
            font-size: 0.9rem; display: none;
        }
        #status-message.success { color: white; background-color: var(--success-color); display: block; }
        #status-message.error { color: white; background-color: var(--error-color); display: block; }
    </style>
</head>
<body>
    <div class="reset-container">
        <!-- Vista 1: Solicitar Enlace -->
        <div id="request-view">
            <h1><i class="fas fa-key"></i> Restablecer Contraseña</h1>
            <p class="instructions">Ingresa tu correo. Te enviaremos un enlace para restablecer tu contraseña.</p>
            <form id="request-form">
                <div class="form-group">
                    <label for="reset-email">Correo Electrónico:</label>
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="reset-email" placeholder="tu_correo@ejemplo.com" required>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Enviar Enlace</button>
            </form>
        </div>

        <!-- Vista 2: Actualizar Contraseña (oculta por defecto) -->
        <div id="update-view" style="display: none;">
            <h1><i class="fas fa-shield-alt"></i> Crea tu Nueva Contraseña</h1>
            <p class="instructions">Introduce y confirma tu nueva contraseña.</p>
            <form id="update-form">
                <div class="form-group">
                    <label for="new-password">Nueva Contraseña:</label>
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="new-password" placeholder="Mínimo 6 caracteres" required>
                </div>
                 <div class="form-group">
                    <label for="confirm-password">Confirmar Contraseña:</label>
                    <i class="fas fa-check-circle input-icon"></i>
                    <input type="password" id="confirm-password" placeholder="Repite la contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Guardar Contraseña</button>
            </form>
        </div>

        <div id="status-message"></div>
        <div class="back-link-container">
            <a href="login.html"><i class="fas fa-arrow-left"></i> Volver a Iniciar Sesión</a>
        </div>
    </div>

    <script type="module">
        // --- Configuración de Supabase (CON TUS CREDENCIALES) ---
        const SUPABASE_URL = 'https://ifvxhywcfxsobupctezb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmdnhoeXdjZnhzb2J1cGN0ZXpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk5MDg3MzAsImV4cCI6MjA2NTQ4NDczMH0.hrpnJSZQrPvsrpR3EloWuQgNOo_tMO7CY5t5C1Vdzg8';
        
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- Referencias a Elementos del DOM ---
        const requestView = document.getElementById('request-view');
        const updateView = document.getElementById('update-view');
        const requestForm = document.getElementById('request-form');
        const updateForm = document.getElementById('update-form');
        const emailInput = document.getElementById('reset-email');
        const newPasswordInput = document.getElementById('new-password');
        const confirmPasswordInput = document.getElementById('confirm-password');
        const statusMessageDiv = document.getElementById('status-message');
        const allButtons = document.querySelectorAll('button');

        // --- Lógica de estado y mensajes ---
        const showStatusMessage = (message, type = 'success') => {
            statusMessageDiv.textContent = message;
            statusMessageDiv.className = type;
        };
        const setLoadingState = (isLoading) => {
            allButtons.forEach(btn => { btn.disabled = isLoading; });
        };

        // --- Lógica Principal ---

        // 1. Enviar el enlace de recuperación
        requestForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setLoadingState(true);
            const email = emailInput.value.trim();
            
            if (!email) {
                showStatusMessage('Por favor, ingresa un correo.', 'error');
                setLoadingState(false);
                return;
            }

            const { error } = await db.auth.resetPasswordForEmail(email, {
                // redirectTo: 'URL_DE_TU_PÁGINA_DE_RESETEO' // Opcional si ya está en la config de Supabase
            });

            if (error) {
                showStatusMessage(`Error: ${error.message}`, 'error');
            } else {
                showStatusMessage('Si existe una cuenta con ese correo, se ha enviado un enlace de recuperación. Revisa tu bandeja de entrada y spam.', 'success');
                requestForm.reset();
            }
            setLoadingState(false);
        });

        // 2. Actualizar la contraseña
        updateForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            setLoadingState(true);
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            if (newPassword.length < 6) {
                showStatusMessage('La contraseña debe tener al menos 6 caracteres.', 'error');
                setLoadingState(false);
                return;
            }

            if (newPassword !== confirmPassword) {
                showStatusMessage('Las contraseñas no coinciden.', 'error');
                setLoadingState(false);
                return;
            }

            const { error } = await db.auth.updateUser({ password: newPassword });

            if (error) {
                showStatusMessage(`Error al actualizar la contraseña: ${error.message}`, 'error');
            } else {
                showStatusMessage('¡Contraseña actualizada con éxito! Ya puedes iniciar sesión.', 'success');
                updateView.style.display = 'none'; // Ocultar formulario de actualización
                // Redirigir a login después de un momento
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            }
            setLoadingState(false);
        });

        // 3. Detectar si el usuario viene de un enlace de recuperación
        db.auth.onAuthStateChanged((event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                requestView.style.display = 'none';
                updateView.style.display = 'block';
                showStatusMessage('Has sido verificado. Por favor, crea una nueva contraseña.', 'success');
            }
        });
    </script>
</body>
</html>
